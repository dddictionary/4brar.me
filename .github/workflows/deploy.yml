name: Deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-and-push:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/dddictionary/4brar.me:latest,ghcr.io/dddictionary/4brar.me:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: "Deploy to VPS"
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy-key.pem
          chmod 600 ~/.ssh/deploy-key.pem
          cat >> ~/.ssh/config <<END
          Host droplet
            HostName $SSH_IP
            User $SSH_USER
            IdentityFile ~/.ssh/deploy-key.pem
            StrictHostKeyChecking no
          END
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_IP: ${{ secrets.SSH_IP }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Create .env file on server
        run: |
          ssh droplet "mkdir -p /root/portfolio && printf 'MYSQL_DATABASE=%s\nMYSQL_USER=%s\nMYSQL_PASSWORD=%s\nMYSQL_HOST=%s\nURL=%s\nCERTBOT_EMAIL=%s\nMARIADB_ROOT_PASSWORD=%s\nGRAFANA_PASSWORD=%s\n' '$MYSQL_DATABASE' '$MYSQL_USER' '$MYSQL_PASSWORD' '$MYSQL_HOST' '$URL' '$CERTBOT_EMAIL' '$MARIADB_ROOT_PASSWORD' '$GRAFANA_PASSWORD' > /root/portfolio/.env"
        env:
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          URL: ${{ secrets.URL }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}

      - name: Deploy site
        run: |
          ssh droplet 'set -e &&
            if [ ! -d /root/portfolio/.git ]; then
              git clone https://github.com/dddictionary/portfolio.git /root/portfolio
            fi &&
            cd /root/portfolio &&
            git fetch && git reset origin/main --hard &&

            # Install systemd services (idempotent)
            cp systemd/portfolio.service /etc/systemd/system/ &&
            cp systemd/portfolio-monitoring.service /etc/systemd/system/ &&
            systemctl daemon-reload &&
            systemctl enable portfolio.service portfolio-monitoring.service &&

            # Zero-downtime deploy (pulls pre-built image, then swaps)
            bash scripts/deploy.sh &&

            # Restart monitoring stack
            systemctl restart portfolio-monitoring.service'
