<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="Abrar Habib — Developer & Creator">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/styles/main.css">
    <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
    <title>{{ title }}</title>

    {% block head %}{% endblock %}
</head>
<body>
    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
        <a href="#top" class="sidebar__brand">AH</a>

        <nav class="sidebar__nav" id="sidebarNav">
            {% for item in navigation %}
            <a href="{{ item.href }}" class="sidebar__link">{{ item.caption }}</a>
            {% endfor %}
        </nav>

        <div class="sidebar__footer">
            <span>&copy; 2026</span>
        </div>

        <button class="sidebar__toggle" id="sidebarToggle" aria-label="Toggle navigation">
            <span></span><span></span>
        </button>
    </aside>

    <!-- ── Content ── -->
    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Mobile sidebar toggle
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('sidebar--open');
            sidebarToggle.classList.toggle('sidebar__toggle--open');
        });

        // Close sidebar on link click (mobile)
        document.querySelectorAll('.sidebar__link').forEach(link => {
            link.addEventListener('click', () => {
                sidebar.classList.remove('sidebar--open');
                sidebarToggle.classList.remove('sidebar__toggle--open');
            });
        });

        // Scroll reveal
        const reveals = document.querySelectorAll('.reveal');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.08 });
        reveals.forEach(el => observer.observe(el));
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
