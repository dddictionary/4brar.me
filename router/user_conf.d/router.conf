server {
    listen 80;
    server_name 4brar.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 4brar.me;

    ssl_certificate /etc/letsencrypt/live/myportfolio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myportfolio/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/myportfolio/chain.pem;

    resolver 127.0.0.11 valid=10s;
    set $app_backend http://nginx-app:80;

    location / {
	proxy_pass $app_backend;
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name observe.4brar.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name observe.4brar.me;

    ssl_certificate /etc/letsencrypt/live/observe.4brar.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/observe.4brar.me/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/observe.4brar.me/chain.pem;

    resolver 127.0.0.11 valid=10s;
    set $monitoring_backend http://nginx-monitoring:80;

    location / {
	proxy_pass $monitoring_backend;
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_http_version 1.1;
	proxy_set_header Upgrade $http_upgrade;
	proxy_set_header Connection "upgrade";
    }
}
