version: "3"
services:
  myportfolio:
    image: ghcr.io/dddictionary/4brar.me:latest
    restart: always
    env_file:
      - .env
    depends_on:
      - mysql
    networks:
      - portfolio_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/metrics')"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  mysql:
    container_name: mysql
    image: mariadb
    restart: always
    env_file:
      - .env
    volumes:
      - mydatabase:/var/lib/mysql
    networks:
      - portfolio_net

  nginx-app:
    container_name: nginx-app
    image: nginx:alpine
    restart: always
    volumes:
      - ./user_conf.d:/etc/nginx/conf.d
    depends_on:
      - myportfolio
    networks:
      - portfolio_net

volumes:
  mydatabase:

networks:
  portfolio_net:
    external: true
    name: portfolio_net
