version: "3"
services:
  prometheus:
    container_name: prometheus
    image: prom/prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - monitoring_net
      - portfolio_net

  grafana:
    container_name: grafana
    image: grafana/grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_SERVER_ROOT_URL=https://observe.4brar.me/
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - monitoring_net

  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - monitoring_net

  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    networks:
      - monitoring_net

  loki:
    container_name: loki
    image: grafana/loki
    restart: always
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    networks:
      - monitoring_net

  promtail:
    container_name: promtail
    image: grafana/promtail
    restart: always
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/promtail-config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - monitoring_net

  nginx-monitoring:
    container_name: nginx-monitoring
    image: nginx:alpine
    restart: always
    volumes:
      - ./monitoring/nginx/user_conf.d:/etc/nginx/conf.d
    depends_on:
      - grafana
    networks:
      - monitoring_net

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  monitoring_net:
    external: true
    name: monitoring_net
  portfolio_net:
    external: true
    name: portfolio_net
